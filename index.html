<body class="bg-sgmBg text-sgmText">
  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef } = React;

    const SCROLL_TOP_OFFSET = 96;
    let smoothScrollTimer = null;

    const smoothScrollToNode = (node, extraOffset = SCROLL_TOP_OFFSET, delay = 110) => {
      if (!node) return;
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      window.clearTimeout(smoothScrollTimer);
      smoothScrollTimer = window.setTimeout(() => {
        window.requestAnimationFrame(() => {
          const rect = node.getBoundingClientRect();
          const targetTop = Math.max(window.scrollY + rect.top - extraOffset, 0);
          if (Math.abs(window.scrollY - targetTop) < 6) return;
          window.scrollTo({ top: targetTop, behavior: prefersReducedMotion ? 'auto' : 'smooth' });
        });
      }, delay);
    };

    const AnimatedCollapse = ({ isOpen, children, className = "", contentClassName = "" }) => {
      const innerRef = useRef(null);
      const [height, setHeight] = useState(isOpen ? 'auto' : 0);

      useEffect(() => {
        const node = innerRef.current;
        if (!node) return;

        let raf;
        let timer;
        let resizeObserver;

        const measure = () => setHeight(node.scrollHeight);

        if (isOpen) {
          raf = window.requestAnimationFrame(measure);
          if (window.ResizeObserver) {
            resizeObserver = new ResizeObserver(() => {
              if (height !== 'auto') measure();
            });
            resizeObserver.observe(node);
          }
          timer = window.setTimeout(() => setHeight('auto'), 440);

          return () => {
            if (raf) window.cancelAnimationFrame(raf);
            if (timer) window.clearTimeout(timer);
            if (resizeObserver) resizeObserver.disconnect();
          };
        }

        const fullHeight = node.scrollHeight;
        setHeight(fullHeight);
        raf = window.requestAnimationFrame(() => setHeight(0));

        return () => {
          if (raf) window.cancelAnimationFrame(raf);
        };
      }, [isOpen, children]);

      return React.createElement(
        "div",
        {
          className,
          style: {
            overflow: 'hidden',
            maxHeight: typeof height === 'number' ? `${height}px` : height,
            opacity: isOpen ? 1 : 0,
            transition: 'max-height 440ms cubic-bezier(0.16, 1, 0.3, 1), opacity 220ms ease'
          }
        },
        React.createElement(
          "div",
          { ref: innerRef, className: `${contentClassName}${isOpen ? ' micro-card-opening' : ''}` },
          children
        )
      );
    };

    const Modal = ({ isOpen, onClose, title, children }) => {
